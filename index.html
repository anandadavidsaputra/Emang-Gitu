<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emang Gitu</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div id="intro-screen" class="screen active">
        <img src="logo.png" alt="Logo" class="floating" style="width: 150px" />
        <h1>Emang Gitu</h1>
        <p>Santai aja. Ini cuma buat lihat kamu tuh orangnya kayak gimana.</p>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 20px">
          15 Chapter untuk membuka tabir takdir.
        </p>
        <button class="btn-start" onclick="startQuiz()">Mulai Cerita</button>
      </div>

      <div id="quiz-screen" class="screen">
        <div class="progress-wrapper">
          <div class="progress-info">
            <span>STORY PROGRESS</span>
            <span id="progress-text">Chapter 1</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <div id="question" class="question-text"></div>
        <div id="options"></div>
      </div>

      <div id="result-screen" class="screen">
        <h1>Takdir Terungkap.</h1>
        <p style="font-size: 14px">
          Inilah naskah hidup yang lu tulis sendiri:
        </p>
        <div id="final-results" class="result-cards"></div>
        <button
          class="btn-start"
          style="
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 13px;
          "
          onclick="location.reload()"
        >
          Ulangi Takdir
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
